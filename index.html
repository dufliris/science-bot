<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호기심 해결사 흥덕이 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ffcfd2; --accent-color: #f1a7a7; --bg-color: #fff9f9; }
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 95%; max-width: 500px; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 85vh; overflow: hidden; border: 4px solid var(--main-color); }
        .header { background-color: var(--main-color); color: #555; padding: 20px; text-align: center; font-size: 1.3rem; font-weight: bold; border-bottom: 2px solid var(--accent-color); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-color: #fff; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; line-height: 1.6; font-size: 1rem; word-break: break-all; position: relative; }
        .bot { background: #fef2f2; align-self: flex-start; border-bottom-left-radius: 2px; color: #444; border: 1px solid #ffe4e6; }
        .user { background: var(--main-color); color: #333; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: bold; }
        .input-area { border-top: 2px solid var(--main-color); padding: 15px; display: flex; gap: 10px; background: white; }
        input { flex: 1; border: 2px solid var(--main-color); padding: 12px; border-radius: 15px; outline: none; font-size: 1rem; }
        button { background: var(--accent-color); border: none; color: white; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #e58e8e; transform: scale(1.05); }
        .loading { font-size: 0.8rem; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">🌟 호기심 해결사 흥덕이</div>
    <div id="chat-window">
        <div class="msg bot">안녕! 나는 궁금한 건 무엇이든 알려주는 '흥덕이' 선생님이에요. 우리 친구는 오늘 어떤 신기한 과학 이야기가 궁금한가요?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="흥덕이에게 물어보세요!" onkeypress="if(event.keyCode==13) sendMessage()">
        <button id="send-btn" onclick="sendMessage()">질문하기</button>
    </div>
</div>
